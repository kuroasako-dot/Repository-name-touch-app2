<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>幼児向けタッチ反応観察アプリ</title>
    <style>
        /* 基本スタイル */
        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
            --panel-bg: #ff6b6b; /* お母さんボタンの色 */
            --accent-color: #4CAF50;
            --ui-bg: #f0f0f0;
            --ui-text: #333333;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: sans-serif;
            overflow: hidden;
            touch-action: manipulation;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* ヘッダー情報 */
        #info-bar {
            padding: 10px;
            background: rgba(255, 255, 255, 0.1);
            text-align: center;
            font-size: 1rem;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        /* メインの表示エリア */
        #main-stage {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 20px;
            gap: 100px; /* パネルの間隔を広く設定 */
        }

        .panel-container {
            flex: none; /* 割合指定ではなく固定的なサイズ感に */
            width: 300px; /* パネルの横幅（少し小さめに） */
            max-width: 35vw; 
            aspect-ratio: 1 / 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 画像パネルのデザイン */
        .image-panel {
            width: 100%;
            height: 100%;
            background-color: var(--panel-bg);
            border: 8px solid white; /* 白い枠線 */
            border-radius: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .image-panel img {
            max-width: 85%;
            max-height: 85%;
            object-fit: contain;
            pointer-events: none;
        }

        /* プレースホルダー表示用 */
        .placeholder {
            font-size: 8rem; /* 絵文字を大きく */
        }

        /* アニメーション：タップ時に1.5倍に拡大 */
        .bounce-animation {
            transform: scale(1.5) !important;
        }

        /* 試行終了時の無効化 */
        .disabled {
            opacity: 0.5;
            cursor: default;
        }

        /* 管理者設定エリア */
        #admin-area {
            background-color: var(--ui-bg);
            color: var(--ui-text);
            padding: 10px;
            max-height: 40vh;
            overflow-y: auto;
            border-radius: 20px 20px 0 0;
        }

        details summary {
            padding: 10px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            list-style: none;
            background: #ddd;
            border-radius: 10px;
        }

        .admin-content {
            padding: 15px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .setting-group {
            border: 1px solid #ccc;
            padding: 10px;
            border-radius: 8px;
        }

        .setting-group h4 {
            margin-top: 0;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: #666;
        }

        button {
            padding: 12px 20px;
            font-size: 1rem;
            border: none;
            border-radius: 8px;
            background-color: #666;
            color: white;
            cursor: pointer;
            margin: 4px;
        }

        button.primary {
            background-color: #2196F3;
            font-weight: bold;
            font-size: 1.2rem;
        }

        button.reset {
            background-color: #f44336;
        }

        button:active {
            opacity: 0.7;
        }

        /* ログ表示 */
        #log-container {
            margin-top: 15px;
            font-size: 0.8rem;
            background: #fff;
            padding: 10px;
            border-radius: 5px;
            max-height: 200px;
            overflow-y: scroll;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 4px;
            text-align: left;
        }

        /* モバイル対応調整 */
        @media (max-width: 600px) {
            #main-stage {
                flex-direction: column;
                gap: 50px;
            }
            .panel-container {
                width: 200px;
                max-width: 60vw;
            }
            .placeholder {
                font-size: 5rem;
            }
        }
    </style>
</head>
<body>

<div id="info-bar">
    <div>試行: <span id="display-trial">1</span></div>
    <div>正反応: <span id="display-correct-count">0</span></div>
</div>

<div id="main-stage">
    <div class="panel-container">
        <div id="left-panel" class="image-panel" onclick="onTap('left')"></div>
    </div>
    <div class="panel-container">
        <div id="right-panel" class="image-panel" onclick="onTap('right')"></div>
    </div>
</div>

<div id="admin-area">
    <details>
        <summary>管理者設定・ログ</summary>
        <div class="admin-content">
            
            <div class="setting-group">
                <h4>モード設定</h4>
                <button onclick="setMode('free')">自由タップ</button>
                <button onclick="setMode('trial')">1試行1反応</button>
                <div id="next-btn-area" style="margin-top:10px;">
                    <button class="primary" id="next-trial-btn" onclick="nextTrial()" disabled>つぎへ進む</button>
                </div>
            </div>

            <div class="setting-group">
                <h4>正反応ターゲット</h4>
                <button onclick="setCorrectTarget('A')">お母さん</button>
                <button onclick="setCorrectTarget('B')">風船</button>
            </div>

            <div class="setting-group">
                <h4>ランダム化設定</h4>
                <button onclick="setRandomMode('fixed')">位置固定</button>
                <button onclick="setRandomMode('start')">開始時のみ</button>
                <button onclick="setRandomMode('every')">毎試行</button>
            </div>

            <div class="setting-group">
                <h4>システム</h4>
                <button id="toggle-sound-btn" onclick="toggleSound()">音: ON</button>
                <button class="reset" onclick="resetApp()">全リセット</button>
            </div>

            <div class="setting-group" style="grid-column: 1 / -1;">
                <h4>統計とログ</h4>
                <div id="stat-summary">お母さん: 0 | 風船: 0</div>
                <div id="log-container">
                    <table id="log-table">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>配置(左|右)</th>
                                <th>タップ</th>
                                <th>結果</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>

        </div>
    </details>
</div>

<script>
    // --- 画像の変更方法 ---
    // 下記の "" の間に画像のURL（https://...）を入力してください。
    // 例: motherImageSrc: "https://example.com/mama.png",
    const CONFIG = {
        motherImageSrc: "https://drive.google.com/file/d/1b9-NE_FGVfmxJXVlgIvVDzM-UFNNd8ft/view?usp=drive_link",  // お母さんの画像URL
        balloonImageSrc: "https://drive.google.com/file/d/1ZEhOxYJzPU1wLVtTlqoVqyNM8bg3yz8n/view?usp=drive_link", // 風船の画像URL
        
        defaultCorrectTarget: "A", 
        defaultRandomMode: "every", 
        defaultAppMode: "trial",    
        soundEnabled: true
    };

    let state = {
        appMode: CONFIG.defaultAppMode,
        randomMode: CONFIG.defaultRandomMode,
        correctTarget: CONFIG.defaultCorrectTarget,
        soundEnabled: CONFIG.soundEnabled,
        trialNumber: 1,
        tapCounts: { A: 0, B: 0 },
        isTrialFinished: false,
        currentLayout: ["A", "B"], 
        logs: [],
        audioContext: null
    };

    window.onload = () => {
        applySettingsToUI();
        if (state.randomMode !== 'fixed') {
            shuffleLayout();
        }
        render();
    };

    function applySettingsToUI() {
        document.getElementById('toggle-sound-btn').textContent = `音: ${state.soundEnabled ? 'ON' : 'OFF'}`;
        updateStatSummary();
    }

    function render() {
        const leftPanel = document.getElementById('left-panel');
        const rightPanel = document.getElementById('right-panel');
        const nextBtn = document.getElementById('next-trial-btn');

        setupPanelContent(leftPanel, state.currentLayout[0]);
        setupPanelContent(rightPanel, state.currentLayout[1]);

        if (state.isTrialFinished && state.appMode === 'trial') {
            leftPanel.classList.add('disabled');
            rightPanel.classList.add('disabled');
            nextBtn.disabled = false;
        } else {
            leftPanel.classList.remove('disabled');
            rightPanel.classList.remove('disabled');
            nextBtn.disabled = true;
        }

        document.getElementById('display-trial').textContent = state.trialNumber;
    }

    function setupPanelContent(panel, type) {
        panel.innerHTML = "";
        const img = document.createElement('img');
        
        // パネルの色分け（正解側を少し目立たせるなどの調整も可能）
        panel.style.backgroundColor = (type === "A") ? "#ff6b6b" : "#4ecdc4";

        if (type === "A") {
            if (CONFIG.motherImageSrc) {
                img.src = CONFIG.motherImageSrc;
                panel.appendChild(img);
            } else {
                panel.innerHTML = '<div class="placeholder">👩</div>';
            }
        } else {
            if (CONFIG.balloonImageSrc) {
                img.src = CONFIG.balloonImageSrc;
                panel.appendChild(img);
            } else {
                panel.innerHTML = '<div class="placeholder">🎈</div>';
            }
        }
    }

    function onTap(side) {
        if (state.appMode === 'trial' && state.isTrialFinished) return;

        const tappedType = side === 'left' ? state.currentLayout[0] : state.currentLayout[1];
        const isCorrect = tappedType === state.correctTarget;
        const panel = document.getElementById(`${side}-panel`);

        state.tapCounts[tappedType]++;
        updateStatSummary();
        addLog(tappedType, side, isCorrect);

        if (isCorrect) {
            playSuccessMelody();
            panel.classList.add('bounce-animation');
            setTimeout(() => {
                panel.classList.remove('bounce-animation');
            }, 400);
        }

        if (state.appMode === 'trial') {
            state.isTrialFinished = true;
            render();
        } else {
            state.trialNumber++;
            if (state.randomMode === 'every') shuffleLayout();
            render();
        }
    }

    function nextTrial() {
        state.trialNumber++;
        state.isTrialFinished = false;
        if (state.randomMode === 'every') shuffleLayout();
        render();
    }

    function shuffleLayout() {
        state.currentLayout = Math.random() > 0.5 ? ["A", "B"] : ["B", "A"];
    }

    function addLog(tappedType, side, isCorrect) {
        const logEntry = {
            trial: state.trialNumber,
            layout: state.currentLayout.join('|'),
            tapped: tappedType === "A" ? "お母さん" : "風船",
            side: side === 'left' ? "左" : "右",
            result: isCorrect ? "正解" : "×"
        };
        state.logs.push(logEntry);
        updateLogTable();
    }

    function updateLogTable() {
        const tbody = document.querySelector('#log-table tbody');
        tbody.innerHTML = "";
        [...state.logs].reverse().slice(0, 10).forEach(log => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${log.trial}</td><td>${log.layout}</td><td>${log.tapped}</td><td style="color:${log.result === '正解' ? 'green' : 'red'}">${log.result}</td>`;
            tbody.appendChild(tr);
        });
    }

    function updateStatSummary() {
        document.getElementById('stat-summary').textContent = `お母さん: ${state.tapCounts.A}回 | 風船: ${state.tapCounts.B}回`;
        document.getElementById('display-correct-count').textContent = state.tapCounts[state.correctTarget];
    }

    function initAudio() {
        if (!state.audioContext) state.audioContext = new (window.AudioContext || window.webkitAudioContext)();
    }

    function playSuccessMelody() {
        if (!state.soundEnabled) return;
        initAudio();
        const ctx = state.audioContext;
        const melody = [
            { f: 261.63, d: 0.2 }, { f: 329.63, d: 0.2 }, { f: 392.00, d: 0.2 },
            { f: 523.25, d: 0.3 }, { f: 392.00, d: 0.2 }, { f: 440.00, d: 0.2 }, { f: 523.25, d: 0.6 }
        ];
        let startTime = ctx.currentTime;
        melody.forEach(note => {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(note.f, startTime);
            gain.gain.setValueAtTime(0, startTime);
            gain.gain.linearRampToValueAtTime(0.2, startTime + 0.05);
            gain.gain.exponentialRampToValueAtTime(0.01, startTime + note.d);
            osc.connect(gain); gain.connect(ctx.destination);
            osc.start(startTime); osc.stop(startTime + note.d);
            startTime += note.d + 0.05;
        });
    }

    function setMode(m) { state.appMode = m; state.isTrialFinished = false; render(); }
    function setCorrectTarget(t) { state.correctTarget = t; render(); }
    function setRandomMode(rm) { 
        state.randomMode = rm; 
        state.currentLayout = (rm === 'fixed') ? ["A", "B"] : state.currentLayout;
        render(); 
    }
    function toggleSound() {
        state.soundEnabled = !state.soundEnabled;
        document.getElementById('toggle-sound-btn').textContent = `音: ${state.soundEnabled ? 'ON' : 'OFF'}`;
    }
    function resetApp() {
        if (!confirm("リセットしますか？")) return;
        state.trialNumber = 1; state.tapCounts = { A: 0, B: 0 }; state.logs = []; state.isTrialFinished = false;
        updateLogTable(); updateStatSummary(); render();
    }
</script>

</body>
</html>
